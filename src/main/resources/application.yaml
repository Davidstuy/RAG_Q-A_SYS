server:
  port: 8080

spring:
  application:
    name: rag-qa-system
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

openai:
  api-key: YOUR_API_KEY_HERE
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model:
    chat: qwen3.7-max-2026-05-20
    embedding: text-embedding-v4

logging:
  level:
    com.ragqa: DEBUG
    dev.langchain4j: DEBUG